<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recuperar Senha — TRAMPO</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--ink)">

<!-- Orb de fundo -->
<div style="position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,201,122,.06) 0,transparent 70%);top:-100px;right:-100px;pointer-events:none"></div>

<div style="background:var(--ink-card);border:1.5px solid var(--ink-border);border-radius:var(--radius-lg);padding:44px 40px;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.5);position:relative">

  <a href="../index.html" class="nav-logo" style="display:inline-block;margin-bottom:28px;font-size:22px">TRAMP<span>O</span></a>

  <!-- Step 1: Email -->
  <div id="step-email">
    <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);margin-bottom:8px">Recuperar senha 🔐</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6">Digite seu email e enviaremos um link para redefinir sua senha.</p>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="form-group">
        <label class="form-label">Email cadastrado</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')sendReset()">
      </div>
      <button class="btn btn-primary btn-lg btn-block" id="send-btn" onclick="sendReset()">Enviar link de recuperação</button>
      <a href="../index.html" class="btn btn-ghost btn-block text-center" style="font-size:14px">← Voltar ao login</a>
    </div>
  </div>

  <!-- Step 2: Sucesso -->
  <div id="step-success" class="hidden" style="text-align:center">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--green-faint);border:1.5px solid rgba(0,201,122,.3);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px">✉️</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--white);margin-bottom:10px">Email enviado!</h2>
    <p style="color:var(--muted-light);font-size:14px;line-height:1.7;margin-bottom:28px">Verifique sua caixa de entrada (e o spam). O link expira em <strong style="color:var(--green)">1 hora</strong>.</p>
    <a href="../index.html" class="btn btn-primary btn-lg btn-block">Ir para o login</a>
    <button class="btn btn-ghost btn-sm btn-block" style="margin-top:8px" onclick="showStep('email')">Reenviar email</button>
  </div>

  <!-- Step 3: Nova senha (via token na URL) -->
  <div id="step-reset" class="hidden">
    <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);margin-bottom:8px">Nova senha 🔑</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:28px">Escolha uma senha forte.</p>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input type="password" id="new-password" class="form-input" placeholder="Mín. 7 caracteres" oninput="onPwdInput(this.value)">
        <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwd-fill"></div></div>
        <span id="pwd-label" class="form-hint"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar nova senha</label>
        <input type="password" id="confirm-password" class="form-input" placeholder="Repita a senha">
      </div>
      <button class="btn btn-primary btn-lg btn-block" id="reset-btn" onclick="doReset()">Redefinir senha</button>
    </div>
  </div>

</div>

<script src="../js/main.js"></script>
<script>
function showStep(s){['email','success','reset'].forEach(x=>document.getElementById('step-'+x).classList.toggle('hidden',x!==s))}

// Verifica se há token na URL
window.addEventListener('DOMContentLoaded',()=>{
  const token=new URLSearchParams(location.search).get('token');
  if(token)showStep('reset');
});

async function sendReset(){
  const email=document.getElementById('email').value.trim();
  if(!email){toast('Digite seu email','warning');return}
  const btn=document.getElementById('send-btn');
  btnLoading(btn,true,'Enviando...');
  const r=await apiFetch('/auth/forgot-password',{method:'POST',body:JSON.stringify({email})});
  btnLoading(btn,false);
  // Mesmo em erro mostramos sucesso (segurança — não revelar se email existe)
  showStep('success');
}

function onPwdInput(v){
  const s=checkPasswordStrength(v);
  const colors=['#ef4444','#f97316','#f59e0b','#84cc16','#00c97a'];
  const labels=['Muito fraca','Fraca','Média','Forte','Muito forte'];
  const fill=document.getElementById('pwd-fill');
  const lbl=document.getElementById('pwd-label');
  if(fill)fill.style.cssText=`width:${s*20}%;background:${colors[s-1]||'var(--ink-border)'}`;
  if(lbl){lbl.textContent=s>0?labels[s-1]:'';lbl.style.color=colors[s-1]||''}
}

async function doReset(){
  const token=new URLSearchParams(location.search).get('token');
  const p=document.getElementById('new-password').value;
  const c=document.getElementById('confirm-password').value;
  if(!p||!c){toast('Preencha os campos','warning');return}
  if(p!==c){toast('As senhas não coincidem','warning');return}
  if(checkPasswordStrength(p)<3){toast('Senha muito fraca','warning');return}
  const btn=document.getElementById('reset-btn');
  btnLoading(btn,true,'Salvando...');
  const r=await apiFetch('/auth/reset-password',{method:'POST',body:JSON.stringify({token,new_password:p})});
  btnLoading(btn,false);
  if(!r||!r.ok){toast(r?.data?.error||'Link inválido ou expirado','error');return}
  toast('Senha redefinida! Faça login. ✅','success',5000);
  setTimeout(()=>window.location.href='../index.html',1500);
}
</script>
<script src="../js/radio-bar.js"></script>
</body>
</html>

services:
  - type: web
    name: trampo-backend
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: corepack enable && pnpm install && pnpm run build
    startCommand: node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production

  - type: static
    name: trampo-frontend
    rootDir: artifacts/trampo
    buildCommand: corepack enable && pnpm install && pnpm run build
    staticPublishPath: dist
